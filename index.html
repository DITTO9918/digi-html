<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/orbitron@5.0.0/index.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/rajdhani@5.0.0/index.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.0.0/index.css">
<style>
  :root {
    --neon-cyan: #00f0ff;
    --neon-purple: #b026ff;
    --neon-pink: #ff00aa;
    --bg-dark: #05060a;
    --bg-panel: rgba(10, 14, 22, 0.8);
    --border-glow: rgba(0, 240, 255, 0.25);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-dark);
    color: #e2e8f0;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    height: 100vh;
  }
  #bgCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    opacity: 0.6;
  }
  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
    grid-template-columns: 320px 1fr;
    gap: 0;
  }
  .font-tech { font-family: 'Orbitron', sans-serif; letter-spacing: 0.05em; }
  .font-mono-tech { font-family: 'JetBrains Mono', monospace; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
  ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--neon-cyan), var(--neon-purple)); border-radius: 4px; }

  .header {
    grid-column: 1 / -1;
    background: linear-gradient(90deg, rgba(5,6,10,0.95), rgba(10,14,22,0.85));
    border-bottom: 1px solid var(--border-glow);
    backdrop-filter: blur(12px);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center;
    font-weight: 900;
    color: #000;
    font-size: 18px;
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { filter: drop-shadow(0 0 8px var(--neon-cyan)); }
    50% { filter: drop-shadow(0 0 16px var(--neon-purple)); }
  }
  .status-bar {
    display: flex;
    gap: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #94a3b8;
  }
  .status-item { display: flex; align-items: center; gap: 6px; }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--neon-cyan);
    box-shadow: 0 0 6px var(--neon-cyan);
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .sidebar {
    background: var(--bg-panel);
    border-right: 1px solid var(--border-glow);
    backdrop-filter: blur(12px);
    overflow-y: auto;
    padding: 20px 0;
  }
  .sidebar-title {
    padding: 0 20px 16px;
    font-size: 11px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    margin-bottom: 12px;
  }
  .folder {
    cursor: pointer;
    transition: all 0.2s;
    border-left: 2px solid transparent;
  }
  .folder:hover { background: rgba(0, 240, 255, 0.04); }
  .folder.active {
    background: rgba(0, 240, 255, 0.08);
    border-left-color: var(--neon-cyan);
  }
  .folder-header {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    font-weight: 600;
  }
  .folder-icon {
    width: 28px; height: 20px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    clip-path: polygon(0 0, 40% 0, 50% 20%, 100% 20%, 100% 100%, 0 100%);
    flex-shrink: 0;
    position: relative;
  }
  .folder-icon::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0; right: 0;
    height: 2px;
    background: var(--neon-cyan);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .folder:hover .folder-icon::after, .folder.active .folder-icon::after { opacity: 1; }
  .folder-arrow {
    margin-left: auto;
    transition: transform 0.2s;
    color: #64748b;
    font-size: 10px;
  }
  .folder.expanded .folder-arrow { transform: rotate(90deg); }
  .subfolder-list {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    background: rgba(0,0,0,0.2);
  }
  .folder.expanded .subfolder-list { max-height: 500px; }
  .subfolder {
    padding: 10px 20px 10px 60px;
    font-size: 13px;
    color: #94a3b8;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
    border-left: 2px solid transparent;
  }
  .subfolder:hover { color: var(--neon-cyan); background: rgba(0, 240, 255, 0.03); }
  .subfolder.active {
    color: var(--neon-cyan);
    background: rgba(0, 240, 255, 0.06);
    border-left-color: var(--neon-purple);
  }
  .subfolder-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: currentColor;
  }

  .main {
    overflow-y: auto;
    padding: 32px 40px;
    position: relative;
  }
  .content-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border-glow);
    border-radius: 12px;
    backdrop-filter: blur(16px);
    padding: 32px;
    margin-bottom: 24px;
    animation: slideIn 0.4s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .breadcrumb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #64748b;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .breadcrumb span { color: var(--neon-cyan); }
  .breadcrumb .sep { color: #475569; }

  .hero-banner {
    width: 100%;
    height: 200px;
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(176, 38, 255, 0.1));
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border-glow);
    display: flex;
    align-items: flex-end;
  }
  .hero-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 240, 255, 0.03) 2px, rgba(0, 240, 255, 0.03) 4px);
  }
  .hero-title {
    position: relative;
    z-index: 2;
    padding: 24px;
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
  }

  .section-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));

    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .section-subtitle {
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 24px;
    font-family: 'JetBrains Mono', monospace;
  }
  .content-block {
    margin-bottom: 28px;
  }
  .content-block h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    color: var(--neon-cyan);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .content-block h3::before {
    content: '>';
    color: var(--neon-purple);
    font-family: 'JetBrains Mono', monospace;
  }
  .content-block p, .content-block li {
    font-size: 15px;
    line-height: 1.7;
    color: #cbd5e1;
  }
  .content-block ul, .content-block ol {
    padding-left: 24px;
    margin: 8px 0;
  }
  .content-block li { margin-bottom: 6px; }
  .content-block li::marker { color: var(--neon-cyan); }

  .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    background: rgba(0, 240, 255, 0.1);
    color: var(--neon-cyan);
    border: 1px solid rgba(0, 240, 255, 0.3);
    margin-right: 6px;
    margin-bottom: 4px;
  }
  .tag-purple {
    background: rgba(176, 38, 255, 0.1);
    color: var(--neon-purple);
    border-color: rgba(176, 38, 255, 0.3);
  }

  .link-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: linear-gradient(90deg, rgba(0, 240, 255, 0.1), rgba(176, 38, 255, 0.1));
    border: 1px solid var(--border-glow);
    border-radius: 6px;
    color: var(--neon-cyan);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-decoration: none;
    transition: all 0.2s;
    margin-right: 8px;
    margin-bottom: 8px;
  }
  .link-btn:hover {
    background: linear-gradient(90deg, rgba(0, 240, 255, 0.2), rgba(176, 38, 255, 0.2));
    box-shadow: 0 0 12px rgba(0, 240, 255, 0.3);
    transform: translateY(-1px);
  }

  table.tech-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin: 12px 0;
  }
  table.tech-table th {
    background: rgba(0, 240, 255, 0.08);
    color: var(--neon-cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    padding: 12px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border-glow);
  }
  table.tech-table td {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    color: #cbd5e1;
  }
  table.tech-table tr:hover td { background: rgba(0, 240, 255, 0.03); }

  .info-card {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .info-card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    color: var(--neon-purple);
    margin-bottom: 6px;
  }

  .authors-box {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 16px;
  }
  .author-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: rgba(176, 38, 255, 0.08);
    border: 1px solid rgba(176, 38, 255, 0.25);
    border-radius: 20px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: #e2e8f0;
  }
  .author-avatar {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #000;
  }

  .hardware-img {
    width: 100%;
    height: 180px;
    border-radius: 8px;
    background: linear-gradient(135deg, rgba(0, 240, 255, 0.05), rgba(176, 38, 255, 0.05));
    margin-bottom: 16px;
    border: 1px solid var(--border-glow);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    color: var(--neon-cyan);
    font-size: 14px;
    letter-spacing: 0.1em;
  }

  .glitch-text {
    position: relative;
  }
  .glitch-text:hover {
    animation: glitch 0.3s;
  }
  @keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(2px, -2px); }
    100% { transform: translate(0); }
  }

  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 240, 255, 0.015) 2px,
      rgba(0, 240, 255, 0.015) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; }
    .sidebar { max-height: 200px; border-right: none; border-bottom: 1px solid var(--border-glow); }
    .main { padding: 20px; }
    .hero-title { font-size: 20px; }
  }
</style>
</head>

</div>

const main = document.getElementById('mainContent');

function openIntro(el) {
  document.querySelectorAll('.folder').forEach(f => f.classList.remove('active'));
  document.querySelectorAll('.subfolder').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  renderContent(data.intro);
}

function toggleFolder(el) {
  const wasExpanded = el.classList.contains('expanded');
  document.querySelectorAll('.folder').forEach(f => f.classList.remove('expanded'));
  if (!wasExpanded) el.classList.add('expanded');
}

function openSubfolder(e, el) {
  e.stopPropagation();
  document.querySelectorAll('.subfolder').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.folder').forEach(f => f.classList.remove('active'));
  el.classList.add('active');
  el.closest('.folder').classList.add('active');

  const blockId = el.dataset.block;
  const subId = el.dataset.id;
  const block = data.blocks.find(b => b.id === blockId);
  const sub = block.subfolders.find(s => s.id === subId);

  renderContent({
    title: sub.title,
    subtitle: `root > ${block.id} > ${sub.id}`,
    content: sub.content,
    blockTitle: block.title,
    blockSubtitle: block.subtitle
  });
}

  `;
  main.scrollTop = 0;
}

const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let w, h, particles = [];

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() {
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.size = Math.random() * 1.5 + 0.5;
    this.alpha = Math.random() * 0.5 + 0.2;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0) this.x = w;
    if (this.x > w) this.x = 0;
    if (this.y < 0) this.y = h;
    if (this.y > h) this.y = 0;
  }
  draw() {
    ctx.fillStyle = `rgba(0, 240, 255, ${this.alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

for (let i = 0; i < 80; i++) particles.push(new Particle());

function animate() {
  ctx.clearRect(0, 0, w, h);
  ctx.strokeStyle = 'rgba(0, 240, 255, 0.04)';
  ctx.lineWidth = 1;
  const gridSize = 60;
  for (let x = 0; x < w; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
  }
  for (let y = 0; y < h; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
  particles.forEach(p => { p.update(); p.draw(); });
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 120) {
        ctx.strokeStyle = `rgba(176, 38, 255, ${0.15 * (1 - dist/120)})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(animate);
}
animate();
